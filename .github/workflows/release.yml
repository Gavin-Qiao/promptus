name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: validate + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate plugin (manifests + components)
        run: bun scripts/validate-plugin.ts

      - name: Run tests
        run: bun test

      - name: Tag must match plugin.json version
        run: |
          manifest="$(bun -e "console.log(JSON.parse(await Bun.file('.claude-plugin/plugin.json').text()).version)")"
          if [ "$manifest" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match plugin.json version ${manifest}"
            exit 1
          fi

      - name: Release-note sanity + extract notes
        run: bun scripts/changelog.ts extract "${{ steps.ver.outputs.version }}" | tee RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Promptus ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
